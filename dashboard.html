<!DOCTYPE html>
<html>
<head>
    <title>Energy Dashboard</title>

    
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #141e30, #243b55);
            margin: 0;
            color: white;
        }

        h1 {
            text-align: center;
        }

        h1, h2, h3 {
            color: #ffffff;
        }

        h2 {
            color: #ffffff;
            margin-top: 20px;
        }

        .section {
            margin: 20px 0;
        }

        .card {
            background: #1f1f1f;
            padding: 20px;
            border-radius: 10px;
            width: 350px;   /* important */
            text-align: center;
        }
                
        .card h3 {
            margin-bottom: 10px;
            color: #00c853;
        }
        .flex {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .input-group {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            padding: 8px;
            margin: 5px;
        }

        button {
            background: #00c853;
            color: white;
            border: none;
            border-radius: 6px;
        }

        button:hover {
            background: #00a844;
        }

        .canvas-container {
            width: 350px;
        }

        .canvas-container canvas {
            max-width: 100%;
            height: 250px !important;
        }

        canvas {
            width: 100% !important;
        }
        
        #tips {
            margin-top: 10px;
        }

        #tips ul {
            list-style: none;
            padding: 0;
        }

        #tips li {
            background: #1f1f1f;
            color: white;
            padding: 12px;
            margin: 8px;
            border-radius: 8px;
        }

        #tips li:hover {
            transform: scale(1.02);
            transition: 0.2s;
        }

    </style>
</head>

<body>

<h1> Energy Dashboard</h1>

<div style="display:flex; justify-content:space-between; padding:15px; background:#1f1f1f;">
    <h2>⚡ Energy Dashboard</h2>
    <div>
        <span id="welcomeUser"></span>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<!-- SUMMARY CARDS -->
<div class="flex">
    <div class="card">
        <h3>Daily Energy</h3>
        <p id="dailyEnergy">0</p>
    </div>

    <div class="card">
        <h3>Monthly Bill</h3>
        <p id="bill">0</p>
    </div>
</div>

<hr>

<h2>Add Appliance</h2>
<input id="a_name" placeholder="Name (AC, Fan)">
<input id="a_power" placeholder="Power (W)">
<input id="a_hours" placeholder="Hours/Day">
<button onclick="addAppliance()">Add</button>

<hr>

<div class="flex">
    <div class="card canvas-container">
        <h3>Energy by Appliance</h3>
        <canvas id="barChart"></canvas>
    </div>

    <div class="card canvas-container">
        <h3>Energy Distribution</h3>
        <canvas id="pieChart"></canvas>
    </div>
</div>

<hr>

<!-- RECOMMENDATIONS -->
<h2>Recommendations</h2>
<p id="tips"></p>

<!-- Chart.js (used for visualization) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Your JavaScript -->
<script>

    let currentUser = localStorage.getItem("user");

    if (!currentUser) {
        alert("Please login first");
        window.location.href = "login.html";
    }


    document.getElementById("welcomeUser").innerText = "Welcome, " + currentUser;


    function logout() {
        localStorage.removeItem("user");
        window.location.href = "login.html";
    }


    const BASE_URL = "http://127.0.0.1:8000";


    // REGISTER
    function register() {
        fetch(BASE_URL + "/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                username: document.getElementById("reg_user").value,
                password: document.getElementById("reg_pass").value
            })
        })
        .then(res => res.json())
        .then(data => alert("Registered: " + data.username));
    }

    // LOGIN
    function login() {
        fetch(BASE_URL + "/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                username: document.getElementById("login_user").value,
                password: document.getElementById("login_pass").value
            })
        })
        
        .then(res => {
            if (!res.ok) {
                throw new Error("Login failed");
            }
            return res.json();
        })
        .then(data => {
            currentUser = data.username;
            document.getElementById("loginStatus").innerText =
                "Logged in as: " + currentUser;

            loadDashboard();

        })
        .catch(err => alert(err.message));
    }


    // ADD APPLIANCE
    function addAppliance() {

    // Check login
    if (!currentUser) {
        alert("Please login first");
        return;
    }

    // Validate input
    if (!document.getElementById("a_name").value ||
        !document.getElementById("a_power").value ||
        !document.getElementById("a_hours").value) {

        alert("Please fill all appliance fields");
        return;
    }

    fetch(BASE_URL + "/appliance/add/" + currentUser, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name: document.getElementById("a_name").value,
            power: parseFloat(document.getElementById("a_power").value),
            hours_per_day: parseFloat(document.getElementById("a_hours").value)
        })
    })
    .then(res => res.json())
    .then(data => {
        // Show success
        alert("Added: " + data.name);

        // Clear inputs
        document.getElementById("a_name").value = "";
        document.getElementById("a_power").value = "";
        document.getElementById("a_hours").value = "";

        // IMPORTANT: Refresh dashboard
        loadDashboard();
    })
    .catch(err => alert("Error adding appliance"));
    }


    // LOAD DASHBOARD
    function loadDashboard() {
        if (!currentUser) {
            alert("Please login first");
            return;
        }

        let user = currentUser;

        // Appliances → charts
        fetch(BASE_URL + "/appliance/all/" + user)
        .then(res => res.json())
        .then(data => {
            let names = data.map(a => a.name);
            let energy = data.map(a => a.daily_energy || 0);

            drawBarChart(names, energy);
            drawPieChart(names, energy);
        });

        // Daily energy
        fetch(BASE_URL + "/energy/daily/" + user)
        .then(res => res.json())
        .then(data => {
            document.getElementById("dailyEnergy").innerText =
                data.daily_energy_kwh;
        });

        // Recommendations + bill
    fetch(BASE_URL + "/recommend/" + user)
    .then(res => res.json())
    .then(data => {
        let tipsHtml = "<ul>";

        data.tips.forEach(tip => {
            let color = "#00c853"; // green default

            if (tip.includes("High") || tip.includes("❌")) {
                color = "#ff5252"; // red
            } 
            else if (tip.includes("Moderate") || tip.includes("⚠️")) {
                color = "#ffd600"; // yellow
            }

            tipsHtml += `
                <li style="
                    border-left:6px solid ${color};
                    background:#1f1f1f;
                    color:#ffffff;
                    padding:12px;
                    margin:8px 0;
                    border-radius:8px;
                    font-size:14px;
                    box-shadow:0 2px 6px rgba(0,0,0,0.4);
                ">
                    ${tip}
                </li>
            `;
        });

        tipsHtml += "</ul>";

        document.getElementById("tips").innerHTML = tipsHtml;

        document.getElementById("bill").innerText =
            "₹ " + data.monthly_bill_estimate;
    });
    }

    // BAR CHART
    let barChart, pieChart;

    function drawBarChart(labels, data) {
        if (barChart) barChart.destroy();

        barChart = new Chart(document.getElementById("barChart"), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Energy (kWh)',
                    data: data
                }]
            }
        });
    }

    // PIE CHART
    function drawPieChart(labels, data) {
        if (pieChart) pieChart.destroy();

        pieChart = new Chart(document.getElementById("pieChart"), {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{
                    data: data
                }]
            }
        });
    }

    loadDashboard();

</script>



</body>
</html>
